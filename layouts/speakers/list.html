{{ define "main" }}

<section class="speaker-2 section">
  <div class="container">
    <div class="mb-4">
      {{ .Content }}
    </div>
    <div class="speaker-strip">
      {{ range .Data.Pages.ByTitle }}
      
      <div class="speaker-item">
        <div class="speaker-block">
          <div class="headshot-box">
            {{ $speakerName := .Params.title }}
            <a href="{{.Permalink}}">
                            {{ with .Params.images }}
              {{ $firstImage := index . 0 }}
              <img src="/{{ $firstImage }}" alt="Photo of {{$speakerName}}" class="img-fluid rounded-circle">
            {{ end }}
            </a>
          </div>
          <div class="speaker-info text-center">
            <h4 class="my-0"><a href="{{.Permalink | relURL }}">{{ .Title }}</a></h4>
            <p class="mb-4">{{ .Params.Designation}}</p>
          </div>
        </div>
      </div>
      
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
